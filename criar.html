<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Produto</title>

    <!--LINKS-->
    <link rel="stylesheet" href="css/output.css">
    <script src="js/criar.js" defer></script>
</head>
<body>
        <header class="py-4 flex items-center gap-4 border-b sticky top-0 w-full bg-white">

        <img src="img/list.png" alt="menu" id="menu" class="pl-6 duration-500" onclick="AparecerbarraLateral()">
        <p class="font-bold text-2xl">CRUD App</p>

    <!--BARRA DE NAVEGAÇÃO-->
        <div id="barraLateralPai" class="duration-500 opacity-0 pointer-events-none absolute top-full border-t w-full h-dvh bg-[#0000005e]">
            <div id="barraLateralFilho" class="overflow-hidden whitespace-nowrap duration-500 w-0 shadow-2xl h-full float-left bg-white py-2 flex items-start flex-col gap-4">
                <h1 class="pt-3 px-6 text-2xl font-bold">Selecione:</h1>
                <a href="index.html" class="flex w-full p-3 px-6 bg-blue-600 duration-300 hover:bg-blue-700 text-white rounded-r-md gap-2">
                    <img src="img/to-do-list.png" alt="">
                    <p>Produtos</p>
                </a>
        
                <a href="criar.html" class="flex w-full p-3 px-6 bg-gray-600 duration-300 hover:bg-gray-700 text-white rounded-r-md gap-2">
                    <img src="img/pen.png" alt="">
                    <p>Criar Produtos</p>
                </a>
            </div>
        
        </div>
    </header>
 
    <div id="divEditarPai" class="w-full h-dvh flex items-center justify-center">

        <div id="divEditarFilho" class="duration-500 w-4/10 max-xl:w-2/3 max-sm:w-3/4 max-sm:h-7/10 h-4/5 bg-white rounded-md shadow-lg p-10 flex flex-col gap-10 border">
  
                <h1 class="text-2xl font-bold tracking-wide">Criar Produto</h1>

            <div>
                <label for="">Nome:</label>
                <input type="text" placeholder="Nome" id="nome" class="w-full border rounded-md px-5 py-2 mb-5">
                
                <label for="">Preço:</label>
                <input type="number" placeholder="Preço" id="preco" class="w-full border rounded-md px-5 py-2">
            </div>
            <button id="criar" class="w-full text-center py-2.5 bg-blue-600 rounded-md text-white font-bold tracking-wide active:translate-y-0.5 duration-300 hover:bg-blue-700">Criar</button>
        
        </div>

    </div>

</body>
</html>
